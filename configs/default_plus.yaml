# Configuracao padrao do projeto siamese-ui-error.
# Cabeca siamesa sobre DINOv2 ViT-S/14 congelado; decisao por prototipo do cluster limpo.
seed: 42
val_frac: 0.15
test_frac: 0.24           # teste >= 40 telas limpas (estimativa robusta de falso-alarme)

paths:
  input_dir: data/input
  splits_dir: data/splits
  emb_dir: artifacts/embeddings_plus
  models_dir: artifacts/models_plus
  reports_dir: artifacts/reports_plus

backbone:
  model_name: vit_small_patch14_dinov2.lvd142m
  size: 518                # resolucao nativa do DINOv2 (grid 37x37)
  use_patch_stats: true    # CLS+media+std dos patch tokens (1152-d). MELHOR p/ erros
                           # espaciais (black region/empty space): synt AUROC 0.71->0.88.
  preprocess: pad          # "pad" = padding cinza preservando aspecto (mascara o padding
                           # nas stats de patch) | "resize" = resize anamorfico (espreme)
  batch_size: 16

synthetic:
  enabled: true            # injeta erros sinteticos em imagens limpas (anti-confound, lado do ERRO)
  n_variants: 4
  max_errors_per_image: 2
  seed: 0
  # --- REFLOW: negativos com layout legitimo (anti-confound pelo lado LIMPO) — ver reflow.py ---
  reflow_clean: true       # variantes LIMPAS (scroll/dual-pane/aspect/espacamento) como negativos
  n_reflow_variants: 4     # variantes de reflow por imagem limpa de treino
  max_reflow_ops: 2        # compoe 1..N operadores por variante
  reflow_ops:              # pesos (0 desliga). ar_relayout/two_pane QUEBRAM o confound de resolucao
    scroll_shift: 1.0
    two_pane: 0.6
    ar_relayout: 1.0
    band_jitter: 1.0
  p_reflow_pos: 0.0        # LEGADO/ablacao: erro injetado SOBRE reflow (negativo no legado -> off)
  benign_augment: true     # round-trip de resolucao + jitter foto-metrico nas limpas. ATIVADO
                           # (jun/2026, plano Fase 1/4): negativos LIMPOS com aparencia/resolucao
                           # variada quebram o confound pelo lado limpo -> gap treino->teste ~caiu
                           # pela metade (bAcc 0.31->0.18), held-out clean menos super-marcado.

head:
  hidden: 256
  proj_dim: 64             # CONGELADO (re-selecao honesta jun/2026): vencedor do grid na val
                           # (val_synth_gate 0.832; gates proto E aux concordam no topo) E da
                           # estabilidade multi-seed (regra do 1-SE: 0.821+-0.005, UNICO dentro de
                           # 1 SE — 128/256/32 ficam abaixo). Cabeca MENOR generaliza melhor (gap
                           # treino->teste menor). Selecionado SO na val; teste nunca lido.
  p_drop: 0.3

train:
  epochs: 500              # teto alto; o early-stop (patience) decide quando parar
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 128
  temperature: 0.1         # RE-VALIDADO honestamente (jun/2026): grid na val sobre
                           # temperature x aux_weight x proj_dim -> 0.1 no topo (era 0.05, LEGADO).
  loss: supcon             # supcon | contrastive | triplet (batch-hard online mining)
  triplet_margin: 0.5      # margem da triplet (só usado quando loss=triplet)
  aux_weight: 0.3          # RE-VALIDADO honestamente (jun/2026): grid na val -> 0.3 no topo (era
                           # 0.6, LEGADO). Menos peso no aux = cluster limpo menos overfitado.
  multiclass: true         # true = clusteriza por CATEGORIA (clean + 4 erros do processed_v3:
                           # black_bars, disordered_layout, empty_space, overlay);
                           # aux=softmax, SupCon por categoria, batches balanceados por classe,
                           # decisao em 2 estagios (gate binario + categoria por prototipo).
                           # false = detector BINARIO legado (erro/sem-erro).
  use_real_errors: true    # inclui erros reais no treino
  use_synthetic: true      # inclui erros sinteticos no treino (AND com synthetic.enabled)
  balance_batches: true
  # criterio de salvamento/early-stop (agora RESPEITADO em train.py). Padrao = gate livre de
  # confound (val_synth, metrica de producao). Ver opcoes em src/siamese/config.py.
  early_stop_metric: val_synth_gate
  max_oversample_per_class: 12  # teto de copias/classe por epoca (Fase 4.4: limita superamostragem
                                # das classes raras, ex. disordered_layout). 0 = sem teto.
  patience: 80             # early-stop sobre o gate livre de confound (val_synth)

decision:
  gate_method: prototype   # GATE (Estagio 1): prototype (k-means do cluster limpo) | knn (vizinhos
                           # mais proximos as limpas de treino — melhor p/ manifold limpo multimodal)
  knn_k: 5                 # k dos decisores k-NN (gate e/ou Estagio 2), quando ativos
  k_prototypes: 3          # selecao honesta: k nao afeta o gate (val_synth_gate); k=3 da F1 de
                           # categoria marginalmente melhor que k=1. Mantido em 3.
  objective: specificity   # HEADLINE specificity-first (jun/2026, plano Fase 3.3): escolhe o limiar
                           # por especificidade-alvo, NAO por F1 puro (que inflava o FPR p/ 0.73).
                           # Corta o falso-alarme em telas limpas. "f1"=balanceado | "precision"=alta
                           # precisao (usa target_precision). Curva completa em limiar_por_precisao.
  target_precision: 0.95   # usado apenas quando objective=precision
  target_specificity: 0.80 # usado apenas quando objective=specificity
  # CALIBRACAO da fusao+limiar (SEMPRE na val; nunca no teste). "confound_free" = limpas-val +
  # val_synth(erro) + val_reflow(limpo) -> limiar ESTAVEL (corrige FPR alto). "real_val" = legado.
  calibrate_on: confound_free
  stage2_method: knn         # decisor canonico do Estagio 2 (categoria): prototype | knn | aux.
                             # knn ADOTADO (jun/2026): ganho modesto e consistente na categoria coarse
                             # (held-out 0.626->0.641) sem custo no gate. Ver docs/COMPARACAO_KNN_TRIPLET.md.
  coarse_taxonomy: true      # avalia E2 na taxonomia GROSSA (2 super-classes de erro + clean:
                             # dead_region={black_bars,empty_space}, displaced_content={overlay,disordered_layout})
