# Configuracao padrao do projeto siamese-ui-error.
# Cabeca siamesa sobre DINOv2 ViT-S/14 congelado; decisao por prototipo do cluster limpo.
seed: 42
val_frac: 0.15
test_frac: 0.15

paths:
  input_dir: data/input
  splits_dir: data/splits
  emb_dir: artifacts/embeddings
  models_dir: artifacts/models
  reports_dir: artifacts/reports

backbone:
  model_name: vit_small_patch14_dinov2.lvd142m
  size: 518                # resolucao nativa do DINOv2 (grid 37x37)
  use_patch_stats: true    # CLS+media+std dos patch tokens (1152-d). MELHOR p/ erros
                           # espaciais (black region/empty space): synt AUROC 0.71->0.88.
  preprocess: pad          # "pad" = padding cinza preservando aspecto (mascara o padding
                           # nas stats de patch) | "resize" = resize anamorfico (espreme)
  batch_size: 16

synthetic:
  enabled: true            # injeta erros sinteticos em imagens limpas (anti-confound)
  n_variants: 4
  max_errors_per_image: 2
  seed: 0

head:
  hidden: 256
  proj_dim: 128
  p_drop: 0.3

train:
  epochs: 300
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 128
  temperature: 0.1
  loss: supcon             # supcon | contrastive
  aux_weight: 0.3          # peso do cabecalho auxiliar de classificacao binaria
  use_real_errors: true    # inclui erros reais no treino
  use_synthetic: true      # inclui erros sinteticos no treino
  balance_batches: true
  early_stop_metric: val_ap
  patience: 40

decision:
  k_prototypes: 1          # prototipos do cluster "limpo" (k-means); 1 basta se unimodal
  objective: f1            # "f1" = ponto BALANCEADO (acuracia/precisao justas p/ comparar)
                           # "precision" = modo alta precisao (zero falso-alarme)
  target_precision: 0.95   # usado apenas quando objective=precision
